version: "3.9"

services:

  api:
    build:
      context: ./server/api
    container_name: deepfake-api
    ports:
      - "8080:8080"
    environment:
      APP_BASE_URL: http://localhost:8080
      AI_SERVER_URL: http://ai-server:8000
    volumes:
      - ./server/api/uploads:/app/uploads
    depends_on:
      - ai-server

  ai-server:
    build:
      context: ./server/ai_server
    container_name: deepfake-ai
    ports:
      - "8000:8000"
    volumes:
      - ./server/ai_server/uploads:/app/uploads
      - ./server/ai_server/protected:/app/protected